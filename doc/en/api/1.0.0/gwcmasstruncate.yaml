---
swagger: '2.0'
info:
  version: 1.0.0
  title: GeoWebCache Mass Truncate
  description: The REST API for mass truncation provides a mechanism for completely clearing caches more conveniently than with the seeding system
  contact:
    name: GeoServer
    email: 'geoserver-users@osgeo.org'
    url: 'https://geoserver.org/comm/'
host: localhost:8080
schemes:
- http
basePath: /geoserver/gwc/rest
paths:
  /masstruncate:
    get:
      operationId: masstruncateGet
      tags:
       - "GwcMassTruncate"
      summary: Returns available request types for truncation
      description: Returns xml containing the request type capabilities for mass truncation. The available request types include truncateLayer, truncateParameters, truncateOrphans, truncateExtent, and truncateAll.
      produces:
        - application/xml
      responses:
        200:
          description: OK
          examples:
            application/xml: |
              <massTruncateRequests href="http://localhost:8080/geoserver/gwc/rest/masstruncate.xml">
                <requestType>truncateLayer</requestType>
                <requestType>truncateParameters</requestType>
                <requestType>truncateOrphans</requestType>
                <requestType>truncateExtent</requestType>
                <requestType>truncateAll</requestType>
              </massTruncateRequests>
    post:
      operationId: masstruncatePost
      tags:
       - "GwcMassTruncate"
      summary: Issue a mass truncate request
      description: Issues a mass truncate request based on the request type parameter. Different request types allow for various truncation strategies. truncateLayer clears all caches associated with a named layer, including all permutations of gridset, parameter filter values, and image formats. truncateAll clears all cached tiles across all layers, gridsets, formats, and parameter filters in the entire GeoWebCache.
      parameters:
        - name: requestType
          description: The requestType parameter is used to control which cached tiles to truncate. The available types are truncateLayer (single layer), truncateParameters (layer with specific parameters), truncateOrphans (orphaned tiles), truncateExtent (tiles within bounds), and truncateAll (entire cache).
          in: query
          required: true
          type: string
          enum:
            - truncateLayer
            - truncateParameters
            - truncateOrphans
            - truncateExtent
            - truncateAll

        - name: layer
          in: query
          required: false
          description: The layername to truncate. Required for truncateLayer and truncateParameters request types. Not applicable for truncateAll.
          type: string
      responses:
        200:
          description: OK
          examples:
            application/xml: |
              <truncateAllResponse>
                <truncatedLayers>workspace:layer1,workspace:layer2,workspace:layer3</truncatedLayers>
              </truncateAllResponse>
definitions:
  TruncateAllRequest:
    type: object
    description: Request object for truncating all cached tiles
    properties:
      requestType:
        type: string
        enum:
          - truncateAll
        description: The request type must be set to 'truncateAll'
  TruncateAllResponse:
    type: object
    description: Response from truncateAll operation
    properties:
      truncatedLayers:
        type: string
        description: Comma-separated list of all layer names that were truncated
